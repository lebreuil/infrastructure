# F5 NGINX Ingress Controller Helm values
#
# nodeSelector:
#   Uses the custom label infomaniak.com/node-role=worker applied
#   to the worker node pool via infomaniak_kaas_instance_pool.workers.
#   This is stable and predictable regardless of the Infomaniak-generated
#   pool name (e.g. pck-w6rxgvy-ph9).

controller:
  service:
    type: LoadBalancer
    annotations:
      loadbalancer.openstack.org/subnet-id: "${subnet_id}"

  enableCustomResources: false

  nodeSelector:
    custom.kaas.infomaniak.cloud/node-role: "management"
